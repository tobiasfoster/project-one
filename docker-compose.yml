services:
  app:
    build:
      context: .
      args:
        VITE_ENABLE_MOCKS: "true"
    ports:
      - "8080:8080"
    restart: unless-stopped

  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_ENABLE_MOCKS=true
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"

volumes:
  node_modules:
