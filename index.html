<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Eagle Bank - Modern banking frontend platform" />
    <title>Eagle Bank</title>
  </head>
  <body>
    <div id="root">
      <div
        id="app-bootstrap-loader"
        role="status"
        aria-label="Loading"
        style="
          display: flex;
          min-height: 100vh;
          align-items: center;
          justify-content: center;
          background: #f0f4f8;
        "
      >
        <svg
          aria-hidden="true"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#627d98"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="animation: app-bootstrap-spin 1s linear infinite"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
    </div>
    <style>
      @keyframes app-bootstrap-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        #app-bootstrap-loader {
          background: #0a1119 !important;
        }
        #app-bootstrap-loader svg {
          stroke: #8aa0b6;
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
